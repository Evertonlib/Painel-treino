<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Treino do Dia</title>
    <script>
      (function () {
        try {
          var tema = localStorage.getItem('treinoDoDia:tema:v1')
          if (tema !== 'claro' && tema !== 'escuro') {
            tema = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'escuro' : 'claro'
          }
          if (tema === 'escuro') document.documentElement.classList.add('dark')
        } catch (erro) {
          // localStorage indisponível: mantém o tema claro padrão
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
